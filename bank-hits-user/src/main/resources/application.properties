spring.application.name=bank-hits-user
spring.datasource.url=jdbc:postgresql://db_user:5432/user_db
spring.datasource.username=user_user
spring.datasource.password=user_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

security.basic.enabled=false
spring.main.allow-bean-definition-overriding=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.main.allow-circular-references=true
logging.level.org.springframework.security=TRACE
clients.account.url=http://localhost:8082
spring.cloud.compatibility-verifier.enabled=false
credit.service.url=http://localhost:8083
