<div class="client-layout">
  <div class="client-layout__container">
    <aside class="client-layout__sidebar">
      <nav class="client-layout__nav">
        @for (item of navItems; track item.path) {
          <a
            class="client-layout__nav-link"
            [routerLink]="item.path"
            routerLinkActive="client-layout__nav-link--active"
            [routerLinkActiveOptions]="{ exact: item.path === 'dashboard' }"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    </aside>
    <main class="client-layout__main">
      <h2 class="client-layout__title">{{ pageTitle }}</h2>
      <router-outlet />
    </main>
  </div>
</div>
