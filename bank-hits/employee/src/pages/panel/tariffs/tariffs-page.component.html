<section class="domain-page">
  <header class="page-header">
    <h1>Кредитные тарифы</h1>
    <button type="button" class="action" (click)="addTariffModalOpen = true">Добавить тариф</button>
  </header>

  <section class="cards-grid">
    @for (tariff of tariffs; track tariff.name) {
      <article class="tariff-card">
        <div class="card-top">
          <h2>{{ tariff.name }}</h2>
          <span>%</span>
        </div>
        <p>Создан: {{ tariff.createdAt }}</p>
        <div class="rate-box">
          <small>Процентная ставка</small>
          <strong>{{ tariff.rate }}</strong>
        </div>
      </article>
    }
  </section>

  <shared-basic-modal
    [open]="addTariffModalOpen"
    [title]="'Добавить тариф'"
    [text]="'Пока только пустая модалка без UI.'"
    (closed)="addTariffModalOpen = false"
  ></shared-basic-modal>
</section>
