<section class="domain-page">
  <header class="page-header">
    <h1>Кредитные тарифы</h1>
    <button type="button" class="action" (click)="addTariffModalOpen = true">Добавить тариф</button>
  </header>

  <section class="cards-grid">
    @for (tariff of tariffs; track tariff.name + tariff.createdAt) {
      <article class="tariff-card">
        <div class="card-top">
          <h2>{{ tariff.name }}</h2>
          <span>%</span>
        </div>
        <p>Создан: {{ tariff.createdAt }}</p>
        <div class="rate-box">
          <small>Процентная ставка</small>
          <strong>{{ tariff.rate }}</strong>
        </div>
      </article>
    }
  </section>

  <shared-basic-modal [open]="addTariffModalOpen" [title]="'Добавить кредитный тариф'" (closed)="addTariffModalOpen = false">
    <form class="modal-form" (ngSubmit)="addTariff()">
      <label>
        Название тарифа
        <input [(ngModel)]="newTariff.name" name="tariffName" type="text" required />
      </label>

      <label>
        Ставка, %
        <input [(ngModel)]="newTariff.rate" name="tariffRate" type="number" min="0.1" step="0.1" required />
      </label>

      <button type="submit" class="submit-btn">Сохранить тариф</button>
    </form>
  </shared-basic-modal>
</section>
