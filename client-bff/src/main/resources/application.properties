spring.application.name=client-bff

server.port=8084

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/client_bff_db
spring.datasource.username=client_bff_user
spring.datasource.password=client_bff_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring Session JDBC
spring.session.jdbc.initialize-schema=always

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Producer: at-least-once + idempotence
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.max-in-flight-requests-per-connection=5
spring.kafka.producer.delivery-timeout-ms=120000
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# OAuth2
spring.security.oauth2.client.registration.sso.client-id=client-backend
spring.security.oauth2.client.registration.sso.client-secret=secret
spring.security.oauth2.client.registration.sso.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.sso.redirect-uri=http://localhost:8084/bff/client/auth/callback
spring.security.oauth2.client.registration.sso.scope=openid,profile,roles

# SSO
sso.jwks-url=http://localhost:8085/auth/.well-known/jwks.json
sso.token-url=http://localhost:8085/auth/token

# Downstream services
services.account-service-url=http://localhost:8082
services.credit-service-url=http://localhost:8083
services.user-service-url=http://localhost:8081

# Feign
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=10000
feign.client.config.default.logger-level=BASIC