spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.security.oauth2.client.registration.sso.client-id=client-backend
spring.security.oauth2.client.registration.sso.client-secret=secret
spring.security.oauth2.client.registration.sso.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.sso.redirect-uri=http://localhost:8084/bff/client/auth/callback
spring.security.oauth2.client.registration.sso.scope=openid,profile,roles
services.account-service-url=http://localhost:8082
services.credit-service-url=http://localhost:8083
services.user-service-url=http://localhost:8081
sso.token-url=http://localhost:8085/auth/token
sso.jwks-url=http://localhost:8085/auth/.well-known/jwks.json
spring.kafka.bootstrap-servers=localhost:9092
