spring.application.name=employee-bff
spring.profiles.active=docker
# Server
server.port=8085

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/employee_backend_db
spring.datasource.username=employee_backend_user
spring.datasource.password=employee_backend_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092

# SSO
sso.base-url=http://localhost:8085
sso.authorization-url=http://localhost:8085/auth/authorize
sso.token-url=http://localhost:8085/auth/token
sso.client-id=employee-backend
sso.client-secret=secret
sso.redirect-uri=http://localhost:8086/bff/employee/auth/callback
sso.jwks-url=http://localhost:8085/auth/.well-known/jwks.json

# Downstream services
services.account-service-url=http://localhost:8082
services.credit-service-url=http://localhost:8083
services.user-service-url=http://localhost:8081

# App
app.frontend-url=http://localhost:4201
app.cookie-name=access_token

# Feign
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=10000
feign.client.config.default.logger-level=BASIC
#
