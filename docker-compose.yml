services:

  # ─── USER SERVICE ─────────────────────────────────────────
  db_user:
    image: postgres:16
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    networks: [appnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  service_user:
    build:
      context: ./bank-hits-user
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db_user:5432/user_db
      SPRING_DATASOURCE_USERNAME: user_user
      SPRING_DATASOURCE_PASSWORD: user_pass
    depends_on:
      db_user:
        condition: service_healthy
    networks: [appnet]
    ports:
      - "8081:8080"

  # ─── CORE SERVICE (Ядро) ──────────────────────────────────
  db_core:
    image: postgres:16
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_pass
    networks: [appnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core_user -d core_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  service_core:
    build:
      context: ./bank-hits-core
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db_core:5432/core_db
      SPRING_DATASOURCE_USERNAME: core_user
      SPRING_DATASOURCE_PASSWORD: core_pass
      CLIENTS_USER_SERVICE_URL: http://service_user:8080
    depends_on:
      db_core:
        condition: service_healthy
      service_user:
        condition: service_started
    networks: [appnet]
    ports:
      - "8082:8080"

  # ─── CREDIT SERVICE ───────────────────────────────────────
  db_credit:
    image: postgres:16
    environment:
      POSTGRES_DB: credit_db
      POSTGRES_USER: credit_user
      POSTGRES_PASSWORD: credit_pass
    networks: [appnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit_user -d credit_db"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5433:5432"

  service_credit:
    build:
      context: ./bank-hits-credit
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db_credit:5432/credit_db
      SPRING_DATASOURCE_USERNAME: credit_user
      SPRING_DATASOURCE_PASSWORD: credit_pass
      CORE_SERVICE_URL: http://service_core:8080
      CLIENTS_USER_SERVICE_URL: http://service_user:8080
    depends_on:
      db_credit:
        condition: service_healthy
      service_core:
        condition: service_started
      service_user:
        condition: service_started
    networks: [appnet]
    ports:
      - "8083:8080"

